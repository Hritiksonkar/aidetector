services:
  - type: web
    name: aidetector-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Set this to your frontend domain after deploy (Vercel/Render Static)
      # - key: CORS_ALLOW_ORIGINS
      #   value: https://your-frontend-domain
      # Optional: if HTTPS downloads fail in some networks
      # - key: HTTP_VERIFY_SSL
      #   value: "1"
      # - key: YTDLP_NO_CHECK_CERT
      #   value: "1"
